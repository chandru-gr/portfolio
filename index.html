<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ultra Portfolio</title>

  <!-- AOS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- NAV -->
<header>
  <div class="logo">MyPortfolio</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div id="particles-js"></div>

  <h1 data-aos="fade-up">Hi, I'm <span>Developer</span></h1>

  <p data-aos="fade-up" data-aos-delay="200">
    <span id="typing"></span>
  </p>

  <button data-aos="zoom-in" onclick="scrollToSection('projects')">
    Explore My Work
  </button>
</section>

<!-- ABOUT -->
<section id="about" class="section" data-aos="fade-up">
  <h2>About Me</h2>
  <p>I am a passionate developer building modern web apps.</p>
</section>

<!-- SKILLS -->
<section id="skills" class="section" data-aos="fade-up">
  <h2>Skills</h2>
  <div class="grid">
    <div class="card" data-aos="zoom-in">HTML</div>
    <div class="card" data-aos="zoom-in" data-aos-delay="100">CSS</div>
    <div class="card" data-aos="zoom-in" data-aos-delay="200">JavaScript</div>
    <div class="card" data-aos="zoom-in" data-aos-delay="300">React</div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <h2 data-aos="fade-up">GitHub Projects</h2>

  <!-- Loader -->
  <div id="loader" class="loader">Loading GitHub Projects...</div>

  <!-- Repo container -->
  <div id="repo-container" class="repo-grid"></div>
</section>

<!-- CONTACT -->
<section id="contact" class="section" data-aos="fade-up">
  <h2>Contact</h2>

  <form>
    <input type="text" placeholder="Name" required />
    <input type="email" placeholder="Email" required />
    <textarea placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<!-- JS LIBRARIES -->
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<!-- YOUR JS -->
<script src="script.js"></script>

</body>
</html>
